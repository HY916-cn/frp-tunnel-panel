<!-- 菜单栏图标：与 app 图标同一设计语言（两端节点 + 隧道链路）。
     按 macOS 模板图标规范：只有 alpha 通道有意义，纯黑绘制、镂空处必须透明
     （不能用白色填充，系统会把任何颜色都当作黑色），由系统按明暗主题自动着色。 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 22" width="40" height="22">
  <g fill="none" stroke="#000000" stroke-linecap="round">
    <!-- 隧道外壁 -->
    <path d="M 9 11 C 13 5, 27 5, 31 11" stroke-width="1.5" opacity="0.5"/>
    <path d="M 9 11 C 13 17, 27 17, 31 11" stroke-width="1.5" opacity="0.5"/>
    <!-- 中间链路 -->
    <line x1="9" y1="11" x2="31" y2="11" stroke-width="2.4"/>
    <!-- 两端节点：描边成环，中心镂空 -->
    <circle cx="9" cy="11" r="4.2" stroke-width="2.6"/>
    <circle cx="31" cy="11" r="4.2" stroke-width="2.6"/>
  </g>
</svg>
